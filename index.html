<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louis Darini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 1.25rem;
  font-family: 'Inter', sans-serif;
}
.avatar-ring {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c8a84b, #e8c96d, #c8a84b);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.25rem;
}
.avatar-initials {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: #0a0a0a;
  letter-spacing: 1px;
}
.bio-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: #e8c96d;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 0.35rem;
}
.bio-tagline {
  font-size: 13px;
  color: #666;
  text-align: center;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}
.links-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 380px;
}
.link-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border-radius: 14px;
  text-decoration: none;
  background: #141414;
  border: 1px solid #222;
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.link-btn:hover {
  transform: translateY(-2px);
  border-color: #c8a84b;
}
.link-btn:active { transform: scale(0.98); }
.link-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: #1a1a1a;
  border: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.link-text { flex: 1; }
.link-label {
  font-size: 11px;
  color: #555;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.link-handle { font-size: 15px; font-weight: 500; color: #e0e0e0; }
.link-arrow { color: #c8a84b; font-size: 18px; }
.divider {
  width: 40px;
  height: 1px;
  background: #c8a84b;
  margin: 2rem auto 1rem;
  opacity: 0.4;
}
.footer { font-size: 11px; color: #333; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
